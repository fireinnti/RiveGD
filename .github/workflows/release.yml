name: Build & Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to attach artifacts to (must already exist as a release). Leave blank for artifact-only run."
        required: false
        default: ""

jobs:
  build:
    name: ${{ matrix.config.name }} (${{ matrix.target }})
    runs-on: ${{ matrix.config.runner }}
    strategy:
      fail-fast: false
      matrix:
        target: [template_debug, template_release]
        config:
          - name: macos-universal
            runner: macos-14
            platform: macos
            shader_platform: macos
            arch: universal
          - name: windows-x86_64
            runner: windows-2022
            platform: windows
            shader_platform: windows
            arch: x86_64
          - name: linux-x86_64
            runner: ubuntu-22.04
            platform: linux
            shader_platform: linuxbsd
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: python -m pip install --upgrade pip scons

      # Linux deps: OpenGL / X11 headers + glslang/spirv-tools for Rive shader build.
      - name: Install Linux build deps
        if: matrix.config.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxi-dev glslang-tools spirv-tools

      # Windows: enable MSVC + ensure fxc.exe (Windows SDK) is on PATH for shader build.
      - name: Setup MSVC
        if: matrix.config.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Vulkan SDK on Windows (provides glslangValidator + spirv-opt for SPIR-V build).
      - name: Install Vulkan SDK (Windows)
        if: matrix.config.platform == 'windows'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: false
          cache: true
          stripdown: true

      - name: Generate Rive shaders
        shell: bash
        run: |
          python3 scripts/build_shaders.py \
            third-party/rive-runtime/renderer/src/shaders \
            third-party/rive-runtime/renderer/include/generated/shaders \
            ${{ matrix.config.shader_platform }}

      - name: Build
        shell: bash
        run: |
          scons platform=${{ matrix.config.platform }} target=${{ matrix.target }} arch=${{ matrix.config.arch }} -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staged/addons/godot-rive/bin
          cp -R project/addons/godot-rive/godot-rive.gdextension staged/addons/godot-rive/ || true
          cp -R project/addons/godot-rive/godot-rive.gdextension.uid staged/addons/godot-rive/ 2>/dev/null || true
          # Copy whatever the build produced for this platform/target.
          cp -R project/addons/godot-rive/bin/* staged/addons/godot-rive/bin/ || true
          ls -R staged

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-rive-${{ matrix.config.name }}-${{ matrix.target }}
          path: staged/**
          if-no-files-found: error
          retention-days: 14

  package:
    name: Package & attach to release
    needs: build
    runs-on: ubuntu-22.04
    if: always() && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Merge artifacts into a single addon tree
        run: |
          set -e
          mkdir -p package/addons/godot-rive/bin
          # Each artifact already has the addon layout; merge them.
          for d in dist/*/addons/godot-rive; do
            cp -R "$d/." package/addons/godot-rive/
          done
          ls -R package
          (cd package && zip -r ../godot-rive-${{ github.ref_name }}.zip addons)
          ls -lh godot-rive-*.zip

      - name: Upload merged zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-rive-addon-zip
          path: godot-rive-*.zip
          retention-days: 30

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: godot-rive-*.zip
